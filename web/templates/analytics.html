{% extends "base.html" %}
{% block heading %}Analytics{% endblock %}
{% block content %}
<div class="two-col">
  <div class="card"><div class="card-head">Articles by Day</div><canvas id="cDay" height="150"></canvas></div>
  <div class="card"><div class="card-head">Articles by Source</div><canvas id="cSource" height="150"></canvas></div>
</div>
<div class="two-col">
  <div class="card"><div class="card-head">Articles by Category</div><canvas id="cCat" height="150"></canvas></div>
  <div class="card"><div class="card-head">Articles by Language</div><canvas id="cLang" height="150"></canvas></div>
</div>
<div class="two-col">
  <div class="card"><div class="card-head">Trending Keywords</div><div id="kw" class="cloud"></div></div>
  <div class="card"><div class="card-head">Top Entities</div><div id="ent"></div></div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="/static/analytics.js"></script>
{% endblock %}
