<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Rawi Press Intelligence{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">RP</div>
      <div>
        <div class="brand-name">RAWI&nbsp;PRESS</div>
        <div class="brand-sub">Saudi Intelligence</div>
      </div>
    </div>
    <nav>
      <a href="/" class="{{ 'on' if active=='home' }}"><span>◈</span> Overview</a>
      <a href="/articles" class="{{ 'on' if active=='articles' }}"><span>▤</span> Articles</a>
      <a href="/sources" class="{{ 'on' if active=='sources' }}"><span>◉</span> Source Monitor</a>
      <a href="/analytics" class="{{ 'on' if active=='analytics' }}"><span>◔</span> Analytics</a>
      <a href="/logs" class="{{ 'on' if active=='logs' }}"><span>≡</span> Collection Logs</a>
    </nav>
    <div class="sidebar-foot">
      <a href="/api/dashboard" target="_blank">REST API ↗</a>
      <div class="ver">v2.0 · SQLite</div>
    </div>
  </aside>

  <main class="content">
    <header class="topbar">
      <div class="topbar-title">{% block heading %}{% endblock %}</div>
      <div class="status-pill"><span class="dot"></span> LIVE</div>
    </header>
    <div class="page">{% block content %}{% endblock %}</div>
  </main>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
